<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="styles.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Student Course Registration System</title>


<script>

document.addEventListener("DOMContentLoaded", function(){

    // If already logged in redirect to dashboard
    if(localStorage.getItem("loggedin") === "true"){
        window.location.href = "dashboard.html";
    }

});

function registerUser(event){

    event.preventDefault();

    let fullname = document.getElementById("fullname").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirm_password").value;

    let errorBox = document.getElementById("errorMsg");

    if(fullname === "" || email === "" || password === ""){
        errorBox.innerText = "Please fill in all required fields.";
        errorBox.style.display = "block";
        return;
    }

    if(password !== confirmPassword){
        errorBox.innerText = "Passwords do not match.";
        errorBox.style.display = "block";
        return;
    }

    // Save user info (simulate database)
    localStorage.setItem("student_id", Date.now());
    localStorage.setItem("student_name", fullname);
    localStorage.setItem("student_email", email);
    localStorage.setItem("student_password", password);
    localStorage.setItem("registered_courses", JSON.stringify([]));
    localStorage.setItem("passport","");

    // Redirect to login
    window.location.href = "login.html?registered=1";

}

</script>

</head>

<body>

<div class="container">

<h1>Student Registration</h1>
<p class="subtitle">Create your account</p>

<div id="errorMsg" class="error" style="display:none;"></div>

<form onsubmit="registerUser(event)">

<div class="form-group">
<label>Full Name *</label>
<input type="text" id="fullname" required>
</div>

<div class="form-group">
<label>Email Address *</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password *</label>
<input type="password" id="password" required>
</div>

<div class="form-group">
<label>Confirm Password *</label>
<input type="password" id="confirm_password" required>
</div>

<button type="submit" class="btn">Register</button>

</form>

<a href="index.html" class="back-link">← Back to Home</a>

</div>

</body>
</html>
