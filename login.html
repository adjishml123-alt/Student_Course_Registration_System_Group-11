<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="styles.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Student Course Registration System</title>


<script>

document.addEventListener("DOMContentLoaded", function(){

    // If already logged in redirect
    if(localStorage.getItem("loggedin") === "true"){
        window.location.href = "dashboard.html";
    }

    // Show success message if redirected from register
    const params = new URLSearchParams(window.location.search);
    if(params.get("registered") === "1"){
        document.getElementById("successMsg").style.display = "block";
    }

});

function loginUser(event){

    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    let errorBox = document.getElementById("errorMsg");

    if(email === "" || password === ""){
        errorBox.innerText = "Please fill in all required fields.";
        errorBox.style.display = "block";
        return;
    }

    // check registered user
    let savedEmail = localStorage.getItem("student_email");

    if(savedEmail === email){

        localStorage.setItem("loggedin","true");

        window.location.href = "dashboard.html";

    }else{

        errorBox.innerText = "You need to register first before logging in.";
        errorBox.style.display = "block";

    }

}

</script>

</head>

<body>

<div class="container">

<h1>Student Login</h1>
<p class="subtitle">Please enter your credentials</p>

<div id="successMsg" class="success" style="display:none;">
Registration successful! Please login with your credentials.
</div>

<div id="errorMsg" class="error" style="display:none;"></div>

<form onsubmit="loginUser(event)">

<div class="form-group">
<label>Email Address *</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password *</label>
<input type="password" id="password" required>
</div>

<button type="submit" class="btn">Login</button>

</form>

<a href="register.html" class="back-link">Don't have an account? Register</a>
<a href="index.html" class="back-link">← Back to Home</a>

</div>

</body>
</html>
